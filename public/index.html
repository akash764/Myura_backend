<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Myura Wellness Backend Demo UI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Myura Wellness API Demo</h1>
      <p class="subtitle">Use this page to test product and order APIs.</p>

      <section class="card">
        <div class="card-header">
          <h2>Products</h2>
          <button id="refreshProductsBtn">Refresh</button>
        </div>
        <div class="table-wrap">
          <table id="productsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>Admin Login (Bonus)</h2>
        <form id="adminLoginForm">
          <label>
            Admin Email
            <input
              type="email"
              name="email"
              placeholder="Use ADMIN_EMAIL from .env"
              required
            />
          </label>
          <label>
            Admin Password
            <input
              type="password"
              name="password"
              placeholder="Use ADMIN_PASSWORD from .env"
              required
            />
          </label>
          <button type="submit">Login</button>
        </form>
        <p id="adminTokenStatus">Not logged in</p>
      </section>

      <section class="card">
        <h2>Add Product</h2>
        <form id="addProductForm">
          <label>
            Product Name
            <input type="text" name="product_name" required />
          </label>
          <label>
            Price
            <input type="number" name="price" min="0" step="0.01" required />
          </label>
          <label>
            Category
            <input type="text" name="category" required />
          </label>
          <label>
            Stock
            <input type="number" name="stock" min="0" step="1" required />
          </label>
          <button type="submit">Create Product</button>
        </form>
      </section>

      <section class="card">
        <h2>Place Order</h2>
        <form id="placeOrderForm">
          <label>
            Customer Name
            <input type="text" name="customer_name" required />
          </label>
          <label>
            Customer Email
            <input type="email" name="customer_email" required />
          </label>
          <label>
            Customer Phone (Optional)
            <input type="text" name="customer_phone" />
          </label>

          <div class="order-items-header">
            <h3>Order Items</h3>
            <button type="button" id="addOrderItemBtn">Add Item</button>
          </div>
          <div id="orderItems"></div>

          <button type="submit">Place Order</button>
        </form>
      </section>

      <section class="card">
        <h2>Status</h2>
        <p id="statusMessage">Ready.</p>
      </section>
    </main>

    <template id="orderItemTemplate">
      <div class="order-item-row">
        <select class="order-product-select"></select>
        <input
          class="order-qty-input"
          type="number"
          min="1"
          step="1"
          placeholder="Quantity"
          required
        />
        <button type="button" class="remove-order-item-btn">Remove</button>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
